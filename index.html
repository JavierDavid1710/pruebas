<!DOCTYPE html>
<html>
<head>
  <title>Valvula SCADA</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0f172a; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 10000);
camera.position.set(0, 0, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🎮 CONTROLES (AQUÍ ESTÁ EL MOVIMIENTO)
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;

// luces
scene.add(new THREE.AmbientLight(0xffffff, 2));

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,5,5);
scene.add(light);

let valve;

const loader = new THREE.GLTFLoader();

loader.load('valvula.glb', function(gltf) {

    valve = gltf.scene;

    // centrar
    const box = new THREE.Box3().setFromObject(valve);
    const center = box.getCenter(new THREE.Vector3());
    valve.position.sub(center);

    // escalar automático
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 5 / maxDim;
    valve.scale.setScalar(scale);

    scene.add(valve);

    controls.target.set(0,0,0);
    controls.update();

});

// 🔄 animación necesaria para mover con mouse
function animate() {
    requestAnimationFrame(animate);

    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
