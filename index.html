<!DOCTYPE html>
<html>
<head>
  <title>Valvula SCADA</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0f172a; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// controles
const controls = new THREE.OrbitControls(camera, renderer.domElement);

// luces
scene.add(new THREE.AmbientLight(0xffffff, 1.5));

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,5,5);
scene.add(light);

// loader
const loader = new THREE.GLTFLoader();

let valve;

loader.load(
  'https://threejs.org/examples/models/gltf/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
  function(gltf) {

    valve = gltf.scene;

    // centrar modelo
    const box = new THREE.Box3().setFromObject(valve);
    const center = box.getCenter(new THREE.Vector3());
    valve.position.sub(center);

    scene.add(valve);

    controls.target.set(0,0,0);
    controls.update();

  },
  undefined,
  function(error) {
    console.error("Error cargando modelo:", error);
  }
);

// animación
function animate() {
    requestAnimationFrame(animate);

    if (valve) {
        valve.rotation.y += 0.01;
    }

    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
