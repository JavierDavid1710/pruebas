<!DOCTYPE html>
<html>
<head>
  <title>Valvula Wireframe</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0f172a; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 10000);
camera.position.set(0, 0, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🎮 controles
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enablePan = false;

// luces (aunque wireframe no depende mucho)
scene.add(new THREE.AmbientLight(0xffffff, 1));

// loader
const loader = new THREE.GLTFLoader();

loader.load('valvula.glb', function(gltf) {

    const valve = gltf.scene;

    // 🔴 CENTRAR MODELO
    const box = new THREE.Box3().setFromObject(valve);
    const center = box.getCenter(new THREE.Vector3());
    valve.position.sub(center);
    valve.position.y -= 2;

    // 🔧 ESCALAR
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 5 / maxDim;
    valve.scale.setScalar(scale);

    // 🔥 CONVERTIR TODO A WIREFRAME
valve.traverse((child) => {
    if (child.isMesh) {
        child.material = new THREE.MeshStandardMaterial({
            color: 0x999999,
            metalness: 0.3,
            roughness: 0.6
        });
    }
});

    scene.add(valve);

    controls.target.set(0,0,0);
    controls.update();

});

// render loop
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
