<!DOCTYPE html>
<html>
<head>
  <title>Valvula SCADA</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0f172a; }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🔆 luces
scene.add(new THREE.AmbientLight(0xffffff, 1));

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,5,5);
scene.add(light);

// loader
const loader = new THREE.GLTFLoader();

let valve;

loader.load('valvula.glb', function(gltf) {

    valve = gltf.scene;

    // 👉 calcular tamaño del modelo
    const box = new THREE.Box3().setFromObject(valve);
    const size = box.getSize(new THREE.Vector3()).length();
    const center = box.getCenter(new THREE.Vector3());

    // 👉 centrar modelo
    valve.position.sub(center);

    // 👉 ajustar escala automáticamente
    const scale = 3 / size;
    valve.scale.setScalar(scale);

    scene.add(valve);

    // 👉 posicionar cámara automáticamente
    camera.position.set(0, size, size * 2);

}, undefined, function(error) {
    console.error("Error cargando modelo:", error);
});

// animación
function animate() {
    requestAnimationFrame(animate);

    if (valve) {
        valve.rotation.y += 0.01;
    }

    renderer.render(scene, camera);
}
animate();

// resize automático
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
