<!DOCTYPE html>
<html>
<head>
  <title>Valvula SCADA</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0f172a; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();

// 📷 cámara
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 6);

// 🎥 renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🎮 controles
const controls = new THREE.OrbitControls(camera, renderer.domElement);

// 🔆 luces
scene.add(new THREE.AmbientLight(0xffffff, 1.5));

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,5,5);
scene.add(light);

// loader
const loader = new THREE.GLTFLoader();

let valve;

loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/GearboxAssy/glTF-Binary/GearboxAssy.glb',
  function(gltf) {

    valve = gltf.scene;

    // 📦 centrar modelo
    const box = new THREE.Box3().setFromObject(valve);
    const center = box.getCenter(new THREE.Vector3());
    valve.position.sub(center);

    // 🔧 escalar modelo
    valve.scale.set(2,2,2);

    scene.add(valve);

    // 🎯 fijar punto de giro
    controls.target.copy(valve.position);
    controls.update();

    // 🚫 evitar que "vuele"
    controls.enablePan = false;
    controls.minDistance = 2;
    controls.maxDistance = 10;
    controls.maxPolarAngle = Math.PI / 2;

  },
  undefined,
  function(error) {
    console.error("Error cargando modelo:", error);
  }
);

// 🔄 animación
function animate() {
    requestAnimationFrame(animate);

    if (valve) {
        valve.rotation.y += 0.005;
    }

    controls.update();
    renderer.render(scene, camera);
}
animate();

// 📐 resize automático
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
