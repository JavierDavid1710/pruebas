<!DOCTYPE html>
<html>
<head>
  <title>Valvula SCADA</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0f172a; }

    #container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1000px;
    }

    img {
      width: 500px;
      transition: transform 0.1s;
    }
  </style>
</head>
<body>

<div id="container">
  <img id="valvula" src="valvula3d.png">
</div>

<script>
const img = document.getElementById("valvula");

document.addEventListener("mousemove", (e) => {
  let x = (window.innerWidth / 2 - e.clientX) / 20;
  let y = (window.innerHeight / 2 - e.clientY) / 20;

  img.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});
</script>

</body>
</html>
